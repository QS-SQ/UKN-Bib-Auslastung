# Automation of Website updates

name: UKN Bib Auslastung

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Controls when the workflow will run
on:
  schedule:
    - cron: "20 6-21 * * *"
  push:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-latest
    env:
      SERVER: ${{ secrets.SERVER }}
      PORT: "993"
      USER: ${{ secrets.USER }}
      PASSWORD: ${{ secrets.PASSWORD }}
      SENDER: ${{ secrets.SENDER }}
      MAPPING: ${{ secrets.MAPPING }}
      CAPACITY: ${{ secrets.CAPACITY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib python-dotenv
          
      - name: Run script
        run: python scripts/main.py

      - name: Verify generated image
        run: |
          echo "Listing docs directory"
          ls -l docs || true
          echo "Checking temp image"
          if [ -f docs/temp_storage/current_capacity_utilization.jpg ]; then
            echo "Image exists"
            stat -c 'Modified: %y' docs/temp_storage/current_capacity_utilization.jpg || true
            sha256sum docs/temp_storage/current_capacity_utilization.jpg || true
          else
            echo "Image not found in docs/temp_storage"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy-pages:
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
